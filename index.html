<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PCBuilder Pro - 智能电脑配置组装平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .glass-panel { background: rgba(15, 25, 35, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(59,130,246,0.25); }
        .component-card { transition: all 0.2s ease; }
        .component-card:hover { transform: translateY(-2px); background: rgba(59,130,246,0.1); border-color: #3b82f6; }
        .usage-btn.active, .platform-btn.active { border-width: 2px; background: rgba(59,130,246,0.2); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; cursor: pointer; margin-top: -7px; box-shadow: 0 0 6px #3b82f6; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #334155; border-radius: 2px; }
        .animate-pulse-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 70% { box-shadow: 0 0 0 8px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
        .transition-all { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-gray-900 text-white min-h-screen">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-panel border-b border-blue-500/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('wizard')">
                    <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center animate-pulse-glow">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">PCBuilder Pro</span>
                </div>
                <div class="hidden md:flex space-x-6">
                    <button onclick="switchTab('wizard')" class="nav-btn text-gray-300 hover:text-white transition px-3 py-2 rounded-lg font-medium">智能配置</button>
                    <button onclick="switchTab('custom')" class="nav-btn text-gray-300 hover:text-white transition px-3 py-2 rounded-lg font-medium">自定义组装</button>
                    <button onclick="switchTab('benchmark')" class="nav-btn text-gray-300 hover:text-white transition px-3 py-2 rounded-lg font-medium">性能评估</button>
                    <button onclick="switchTab('saved')" class="nav-btn text-gray-300 hover:text-white transition px-3 py-2 rounded-lg font-medium">我的配置</button>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="text-right hidden sm:block">
                        <div class="text-xs text-gray-400">预估总价</div>
                        <div class="text-lg font-bold text-green-400 mono" id="nav-total">¥0</div>
                    </div>
                    <button onclick="toggleCart()" class="p-2 bg-gray-800 rounded-xl hover:bg-gray-700 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full w-5 h-5 hidden items-center justify-center">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-4 max-w-7xl mx-auto">
        <!-- Hero -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent">打造专属性能怪兽</h1>
            <p class="text-gray-400 mt-3">智能兼容 · 实时预算 · 性能模拟 · 一键保存</p>
        </div>

        <!-- Tab: Wizard -->
        <div id="tab-wizard" class="tab-content">
            <div class="grid lg:grid-cols-2 gap-6">
                <div class="glass-panel rounded-2xl p-6">
                    <h2 class="text-2xl font-bold mb-5 flex items-center gap-2"><span class="text-blue-400">⚡</span> 智能向导</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">主要用途</label>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="selectUsage(event, 'gaming')" class="usage-btn p-3 bg-gray-800/70 rounded-xl border-2 border-transparent text-left" data-value="gaming"><div class="text-xl">🎮</div><div class="font-semibold">游戏电竞</div><div class="text-xs text-gray-400">3A/网游</div></button>
                                <button onclick="selectUsage(event, 'design')" class="usage-btn p-3 bg-gray-800/70 rounded-xl border-2 border-transparent text-left" data-value="design"><div class="text-xl">🎨</div><div class="font-semibold">设计创作</div><div class="text-xs text-gray-400">剪辑/渲染</div></button>
                                <button onclick="selectUsage(event, 'office')" class="usage-btn p-3 bg-gray-800/70 rounded-xl border-2 border-transparent text-left" data-value="office"><div class="text-xl">💼</div><div class="font-semibold">办公商务</div><div class="text-xs text-gray-400">多任务/文档</div></button>
                                <button onclick="selectUsage(event, 'workstation')" class="usage-btn p-3 bg-gray-800/70 rounded-xl border-2 border-transparent text-left" data-value="workstation"><div class="text-xl">⚙️</div><div class="font-semibold">工作站</div><div class="text-xs text-gray-400">AI/科学计算</div></button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300">预算: <span id="budget-display" class="text-blue-400 font-bold">¥8,000</span></label>
                            <input type="range" min="1000" max="35000" step="500" value="8000" id="budget-slider" class="w-full mt-2" oninput="updateBudget(this.value)">
                            <div class="flex justify-between text-xs text-gray-500 mt-1"><span>¥1k</span><span>¥35k+</span></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">平台偏好</label>
                            <div class="flex gap-3">
                                <button onclick="setPlatform('intel')" class="platform-btn p-2 bg-gray-800/70 rounded-lg flex-1 text-center" data-platform="intel">🔵 Intel</button>
                                <button onclick="setPlatform('amd')" class="platform-btn p-2 bg-gray-800/70 rounded-lg flex-1 text-center" data-platform="amd">🔴 AMD</button>
                                <button onclick="setPlatform('any')" class="platform-btn p-2 bg-gray-800/70 rounded-lg flex-1 text-center active" data-platform="any">⚪ 不限制</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">其他偏好</label>
                            <div class="space-y-2">
                                <label class="flex justify-between p-2 bg-gray-800/50 rounded-lg cursor-pointer"><span>🎯 性能优先 (ITX/M-ATX)</span><input type="checkbox" id="pref-performance" class="w-4 h-4"></label>
                                <label class="flex justify-between p-2 bg-gray-800/50 rounded-lg cursor-pointer"><span>🔇 静音低噪</span><input type="checkbox" id="pref-silent" class="w-4 h-4"></label>
                                <label class="flex justify-between p-2 bg-gray-800/50 rounded-lg cursor-pointer"><span>✨ RGB灯效</span><input type="checkbox" id="pref-rgb" class="w-4 h-4"></label>
                            </div>
                        </div>
                        <button onclick="generateSmartConfig()" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl font-bold hover:shadow-xl transition transform hover:scale-[1.02]">✨ 生成智能配置</button>
                    </div>
                </div>
                <div class="glass-panel rounded-2xl p-6 flex flex-col">
                    <h3 class="text-xl font-bold mb-3">📋 推荐配置单</h3>
                    <div id="wizard-preview" class="flex-1 flex items-center justify-center text-gray-400">点击生成，AI匹配最佳组合</div>
                </div>
            </div>
        </div>

        <!-- Tab: Custom Build -->
        <div id="tab-custom" class="tab-content hidden">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-3">
                    <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">🔧 自定义组装</h2><div><button onclick="clearBuild()" class="text-red-400 text-sm bg-red-500/20 px-3 py-1 rounded-lg">清空</button><button onclick="loadExampleBuild()" class="ml-2 text-blue-400 text-sm bg-blue-500/20 px-3 py-1 rounded-lg">示例配置</button></div></div>

                </div>

                </div>
            </div>
        </div>
<!-- 配置注意事项卡片 -->
<div class="glass-panel rounded-2xl p-5 mt-5">

    <div id="build-tips" class="text-xs space-y-2 text-gray-300">
        <!-- 动态生成提示内容 -->
    </div>
</div>

        <!-- Tab: Benchmark -->
        <div id="tab-benchmark" class="tab-content hidden">
            <div class="glass-panel rounded-2xl p-6 mb-6">
                <h2 class="text-2xl font-bold mb-5">📈 性能模拟评估</h2>

            </div>

                <div class="glass-panel rounded-2xl p-5"><h3 class="font-bold mb-3">🎮 游戏帧数预估 (高画质)</h3><div id="game-fps-list" class="space-y-2"></div></div>

            </div>
        </div>

        <!-- Tab: Saved -->
        <div id="tab-saved" class="tab-content hidden"><h2 class="text-2xl font-bold mb-5">📁 我的配置库</h2><div id="saved-configs-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"></div></div>
    </main>

            if (!component) return '';
            switch (type) {
                case 'cpu':
                    return `${component.socket} | ${component.cores}核${component.threads}线程 | ${component.tdp}W TDP | ${component.name.includes('(核显)') ? '核显' : '无核显'}`;
               case 'gpu': {
    let vram = component.vram ? `${component.vram}GB` : '未知显存';
    return `${component.tdp}W TDP | ${vram} | 建议电源≥${component.power || '550'}W`;
}
                case 'motherboard':
                    return `${component.socket} | ${component.ramType} | ${component.formFactor}`;
                case 'memory':
                    // 显示频率和时序
                    return `${component.type} | ${component.vram}GB | ${component.frequency}MHz | 时序 ${component.timing} | ${component.brand || component.chipset || ''}`;
                case 'storage': {
                    let capacity = '?GB';
                    const match = component.name.match(/(\d+)(TB|GB)/i);
                    if (match) capacity = match[1] + match[2];
                    return `${capacity} | ${component.name.includes('NVMe') ? 'NVMe' : 'SATA'}`;
                }
                case 'psu':
                    // 显示模组类型
                    return `${component.wattage}W | ${component.name.includes('金牌') ? '金牌' : component.name.includes('白金牌') ? '白金牌' : '铜牌'} | ${component.modular || '非模组'}`;
                case 'case':
                    return `${component.formFactor} | ${component.name.includes('Mesh') ? '网孔面板' : ''}`;
                case 'cooler':
                    const typeText = component.type === 'air' ? '风冷' : '水冷';
                    return `${typeText} | ${component.spec} | ${component.tdp}W TDP`;
                default:
                    return '';
            }
        }

        function renderComponentList(filter=''){

                } else if(currentModalType==='storage'){ 
                    subInfo=`${item.type || 'SSD'} ${item.price?`${item.interface||''}`:''}`;

                    subInfo=`${item.formFactor}`; 
                } else if(currentModalType==='cooler'){ 
                    const typeText = item.type === 'air' ? '风冷' : '水冷';

                    subInfo=`${item.tdp}W TDP | 建议${item.power}W电源`;

    let vram = item.vram ? `${item.vram}GB` : '未知显存';
    subInfo = `${item.tdp}W TDP | ${vram} | 建议${item.power}W电源`;
                } else if(currentModalType==='motherboard'){ 
                    subInfo=`${item.socket} | ${item.ramType} | ${item.formFactor}`;

            });

        function isComponentCompatible(type, item) { 
            if (type === 'motherboard' && currentBuild.cpu) 
                return item.socket === currentBuild.cpu.socket; 
            if (type === 'memory' && currentBuild.motherboard) 
                return item.type === currentBuild.motherboard.ramType; 
            if (type === 'cooler' && currentBuild.cpu) 
                return item.tdp >= currentBuild.cpu.tdp; 
            if (type === 'case' && currentBuild.motherboard) { 
                const mbForm = currentBuild.motherboard.formFactor;
                const caseForm = item.formFactor;
                if (mbForm === 'E-ATX' && caseForm !== 'E-ATX') return false;
                if (mbForm === 'ATX' && !['ATX', 'E-ATX'].includes(caseForm)) return false;
                if (mbForm === 'mATX' && !['mATX', 'ATX', 'E-ATX'].includes(caseForm)) return false;
                if (mbForm === 'ITX' && caseForm !== 'ITX') return false;
                return true;
            } 
            return true; 
        }

        function checkCompatibility(){ const issues=[]; if(currentBuild.cpu && currentBuild.motherboard && currentBuild.cpu.socket!==currentBuild.motherboard.socket) issues.push({type:'error',text:'❌ CPU与主板插槽不匹配'}); else if(currentBuild.cpu && currentBuild.motherboard) issues.push({type:'ok',text:'✅ CPU与主板兼容'}); if(currentBuild.motherboard && currentBuild.memory && currentBuild.motherboard.ramType!==currentBuild.memory.type) issues.push({type:'error',text:'❌ 内存类型与主板不匹配'}); if(currentBuild.cpu && currentBuild.cooler && currentBuild.cooler.tdp<currentBuild.cpu.tdp) issues.push({type:'warn',text:'⚠️ 散热器TDP可能不足'}); if(currentBuild.psu && currentBuild.gpu && currentBuild.psu.wattage< (currentBuild.gpu.power||550)) issues.push({type:'error',text:'❌ 电源功率不足'}); if(currentBuild.motherboard && currentBuild.case && !isComponentCompatible('case',currentBuild.case)) issues.push({type:'warn',text:'⚠️ 机箱尺寸可能与主板不匹配'}); const container=document.getElementById('compatibility-list'); if(issues.length===0){container.innerHTML='<div class="text-gray-500 text-center py-2">✨ 所有组件兼容性良好</div>';return;} container.innerHTML=issues.map(i=>`<div class="text-sm ${i.type==='error'?'text-red-400':i.type==='warn'?'text-yellow-400':'text-green-400'}">${i.text}</div>`).join(''); }

     function calcOptimal(usage, budget, realtimePrices = {}, preferences = {}) {
    // 读取偏好设置
    const prefPerformance = preferences.performance || false;
    const prefSilent = preferences.silent || false;
    const prefRgb = preferences.rgb || false;

    // 预算不足降级策略
    const lowBudgetMode = budget < 4000;

    // 用途预算分配比例
    let alloc = {
        gaming: { cpu: 0.18, gpu: 0.42, mb: 0.10, ram: 0.08, storage: 0.07, psu: 0.07, case: 0.05, cooler: 0.03 },
        design: { cpu: 0.27, gpu: 0.30, mb: 0.10, ram: 0.12, storage: 0.08, psu: 0.07, case: 0.04, cooler: 0.02 },
        office: { cpu: 0.28, gpu: 0.12, mb: 0.12, ram: 0.15, storage: 0.15, psu: 0.08, case: 0.05, cooler: 0.05 },
        workstation: { cpu: 0.32, gpu: 0.25, mb: 0.10, ram: 0.15, storage: 0.10, psu: 0.06, case: 0.02, cooler: 0.00 }
    };
    let w = alloc[usage];

    // 低预算调整
    if (lowBudgetMode) {
        w.gpu = 0.10;
        w.cpu = 0.35;
        w.ram = 0.15;
        w.storage = 0.12;
        w.psu = 0.10;
        w.case = 0.04;
        w.cooler = 0.03;
    }
    if (prefPerformance) w.case = Math.max(0.02, w.case - 0.02);
    if (prefSilent) w.cooler = Math.min(0.10, w.cooler + 0.03);

    // 获取价格（支持实时价格）
    const getPrice = (type, item) => {
        if (realtimePrices[type] && realtimePrices[type][item.id] !== undefined)
            return realtimePrices[type][item.id];
        return item.price;
    };

    const pickCheapest = (arr, type) => [...arr].sort((a,b) => getPrice(type, a) - getPrice(type, b))[0];

    const pickWithinBudget = (arr, maxPrice, scoreKey, type, mandatoryFilter) => {
        let candidates = arr.filter(item => {
            if (mandatoryFilter && !mandatoryFilter(item)) return false;
            return getPrice(type, item) <= maxPrice;
        });
        if (candidates.length === 0) {
            let fallback = mandatoryFilter ? arr.filter(mandatoryFilter) : arr;
            if (fallback.length === 0) fallback = arr;
            return fallback.sort((a,b) => getPrice(type, a) - getPrice(type, b))[0];
        }
        if (scoreKey) return candidates.sort((a,b) => b[scoreKey] - a[scoreKey])[0];
        return candidates.reduce((prev, curr) => (
            Math.abs(getPrice(type, curr) - maxPrice) < Math.abs(getPrice(type, prev) - maxPrice) ? curr : prev

    // CPU 选择

    }

        gpuList = components.gpu.filter(g => g.price <= Math.min(1000, budget * w.gpu));
        if (gpuList.length === 0) w.gpu = 0;
    }
    let gpu = null;
    if (w.gpu > 0 && gpuList.length) {
        gpu = pickWithinBudget(gpuList, budget * w.gpu, 'gaming', 'gpu');
    }
    if (!gpu && cpu && !cpu.name.includes('(核显)') && !cpu.name.toLowerCase().includes('g')) {
        let fallbackGpu = components.gpu.sort((a,b) => a.price - b.price)[0];

        ? pickWithinBudget(mbCandidates, budget * w.mb, null, 'motherboard')
        : pickCheapest(components.motherboard, 'motherboard');

    // 内存

    let minRamGB = 8;

    let caseCandidates = [...components.case];

    }
    let caseItem = pickWithinBudget(caseCandidates, budget * w.case, null, 'case');

    // 散热器

    if (w.cooler > 0) {
        let mandatoryTdp = (c) => c.tdp >= cpu.tdp;
        let coolCandidates = components.cooler.filter(mandatoryTdp);
        if (prefSilent) {
            coolCandidates = coolCandidates.filter(c => c.name.toLowerCase().includes('silent') || c.name.toLowerCase().includes('fanless'));
            if (coolCandidates.length === 0) coolCandidates = components.cooler.filter(mandatoryTdp);
        }
        if (prefRgb) {
            let rgbCandidates = coolCandidates.filter(c => c.name.toLowerCase().includes('rgb') || c.name.toLowerCase().includes('argb'));
            if (rgbCandidates.length) coolCandidates = rgbCandidates;
        }
        if (coolCandidates.length) {
            cooler = pickWithinBudget(coolCandidates, budget * w.cooler, null, 'cooler', mandatoryTdp);
        } else {
            cooler = pickCheapest(components.cooler, 'cooler');
        }
    } else {
        let fallbackCooler = components.cooler.filter(c => c.tdp >= cpu.tdp).sort((a,b) => a.price - b.price)[0];
        cooler = fallbackCooler || components.cooler[0];
    }

    let build = { cpu, motherboard, gpu, memory, storage, psu, case: caseItem, cooler };
    const totalPrice = () => {
        let total = 0;
        for (let [k, v] of Object.entries(build)) if (v) total += getPrice(k, v);
        return total;
    };

    // 预算调整循环
    const targetLow = budget * 0.95;
    const targetHigh = budget * 1.02;
    let gpuSorted = [...components.gpu].sort((a,b) => getPrice('gpu', a) - getPrice('gpu', b));
    const getGpuIndex = (gpu) => gpuSorted.findIndex(g => g.id === gpu.id);
    let currentTotal = totalPrice();
    let maxIter = 30;
    let lastTotal = currentTotal;

    while (maxIter-- > 0 && currentTotal < targetLow && currentTotal !== lastTotal) {
        lastTotal = currentTotal;
        let upgraded = false;
        if (gpu && gpuSorted.length) {
            let idx = getGpuIndex(build.gpu);
            if (idx < gpuSorted.length - 1) {
                let candidateGpu = gpuSorted[idx+1];
                let newTotal = currentTotal - getPrice('gpu', build.gpu) + getPrice('gpu', candidateGpu);
                if (newTotal <= targetHigh) {
                    let newPowerNeed = (candidateGpu.power || candidateGpu.tdp * 1.2) + (build.cpu.tdp || 65) + 60;
                    if (build.psu.wattage >= newPowerNeed) {
                        build.gpu = candidateGpu;
                        currentTotal = newTotal;
                        upgraded = true;
                    } else {
                        let betterPsu = components.psu.filter(p => p.wattage >= newPowerNeed && 
                            getPrice('psu', p) <= (budget * w.psu) + (newTotal - currentTotal))
                            .sort((a,b) => getPrice('psu', a) - getPrice('psu', b))[0];
                        if (betterPsu && (newTotal - getPrice('psu', build.psu) + getPrice('psu', betterPsu)) <= targetHigh) {
                            build.gpu = candidateGpu;
                            build.psu = betterPsu;
                            currentTotal = totalPrice();
                            upgraded = true;
                        }
                    }
                }
            }
        }
        if (!upgraded && memory) {
            let memSorted = [...components.memory].filter(m => m.type === build.motherboard.ramType)
                .sort((a,b) => getPrice('memory', a) - getPrice('memory', b));
            let memIdx = memSorted.findIndex(m => m.id === build.memory.id);
            if (memIdx < memSorted.length - 1 && memIdx !== -1) {
                let candidateMem = memSorted[memIdx+1];
                let newTotal = currentTotal - getPrice('memory', build.memory) + getPrice('memory', candidateMem);
                if (newTotal <= targetHigh && candidateMem.vram >= (build.memory.vram || 0)) {
                    build.memory = candidateMem;
                    currentTotal = newTotal;
                    upgraded = true;
                }
            }
        }
        if (!upgraded) break;
    }

    currentTotal = totalPrice();
    while (maxIter-- > 0 && currentTotal > targetHigh) {
        let downgraded = false;
        if (gpu && gpuSorted.length) {
            let idx = getGpuIndex(build.gpu);
            if (idx > 0) {
                let candidateGpu = gpuSorted[idx-1];
                let newTotal = currentTotal - getPrice('gpu', build.gpu) + getPrice('gpu', candidateGpu);
                if (newTotal >= targetLow) {
                    build.gpu = candidateGpu;
                    currentTotal = newTotal;
                    downgraded = true;
                }
            }
        }
        if (!downgraded && memory) {
            let memSorted = [...components.memory].filter(m => m.type === build.motherboard.ramType).sort((a,b) => getPrice('memory', a) - getPrice('memory', b));
            let memIdx = memSorted.findIndex(m => m.id === build.memory.id);
            if (memIdx > 0) {
                let candidateMem = memSorted[memIdx-1];
                let newTotal = currentTotal - getPrice('memory', build.memory) + getPrice('memory', candidateMem);
                if (newTotal >= targetLow) {
                    build.memory = candidateMem;
                    currentTotal = newTotal;
                    downgraded = true;
                }
            }
        }
        if (!downgraded) break;
    }

    return build;

    if (!tipsDiv) return;
    let tips = [];

    // 1. 颜色统一建议
    const colorKeywords = { black: '黑', white: '白', silver: '银', gold: '金', pink: '粉', blue: '蓝', red: '红' };
    const componentsColor = {
        motherboard: currentBuild.motherboard,
        gpu: currentBuild.gpu,
        case: currentBuild.case,
        psu: currentBuild.psu,
    };
    let detectedColors = [];
    for (const [type, comp] of Object.entries(componentsColor)) {
        if (comp && comp.name) {
            const nameLower = comp.name.toLowerCase();
            for (const [en, zh] of Object.entries(colorKeywords)) {
                if (nameLower.includes(en)) {
                    detectedColors.push(zh);
                    break;
                }
            }
        }
    }
    if (detectedColors.length > 1 && new Set(detectedColors).size > 1) {
        tips.push(`🎨 当前配件包含多种颜色 (${detectedColors.join('、')})，建议统一配色提升视觉效果。`);
    } else if (detectedColors.length === 1) {
        tips.push(`🎨 当前主色调为${detectedColors[0]}，搭配同色系机箱、电源会更协调。`);
    } else {
        tips.push(`🎨 建议机箱、电源、主板、显卡尽量选择同色系（如全黑、全白），提升整体美观。`);
    }

    // 2. 机箱尺寸兼容性动态提醒（基于已有数据）
    if (currentBuild.case && currentBuild.motherboard) {
        const mbForm = currentBuild.motherboard.formFactor;
        const caseForm = currentBuild.case.formFactor;
        let mbOk = false;
        if (mbForm === 'E-ATX' && caseForm === 'E-ATX') mbOk = true;
        if (mbForm === 'ATX' && ['ATX', 'E-ATX'].includes(caseForm)) mbOk = true;
        if (mbForm === 'mATX' && ['mATX', 'ATX', 'E-ATX'].includes(caseForm)) mbOk = true;
        if (mbForm === 'ITX' && caseForm === 'ITX') mbOk = true;
        if (!mbOk) tips.push(`📏 主板 ${mbForm} 与机箱 ${caseForm} 不匹配，可能无法安装！`);
        else tips.push(`✅ 主板尺寸与机箱兼容。`);
    }

    if (currentBuild.case && currentBuild.gpu) {
        // 显卡长度（目前无精确数据，给出通用提醒）
        tips.push(`📏 请确认显卡长度 ≤ 机箱支持的显卡限长（通常中塔机箱 ≤ 350mm）。`);
    }
    if (currentBuild.case && currentBuild.cooler) {
        if (currentBuild.cooler.type === 'air') {
            tips.push(`📏 请确认风冷散热器高度 ≤ 机箱CPU散热器限高（通常 ≤ 160mm）。`);
        } else {
            tips.push(`📏 水冷冷排尺寸 (${currentBuild.cooler.spec}) 需匹配机箱冷排安装位。`);
        }
    }
    if (currentBuild.case && currentBuild.psu) {
        tips.push(`📏 请确认电源长度（ATX标准约140-180mm）适配机箱电源仓。`);
    }
    if (currentBuild.case && currentBuild.storage) {
        tips.push(`💾 检查机箱硬盘位数量是否满足需求（2.5"/3.5"）。`);
    }

    // 3. 风扇与散热提醒
    if (currentBuild.case) {
        tips.push(`🌀 机箱风扇位：建议前部进风、后部出风，形成顺畅风道。`);
    }
    if (currentBuild.cooler && currentBuild.cpu) {
        if (currentBuild.cooler.tdp < currentBuild.cpu.tdp) {
            tips.push(`⚠️ 散热器 TDP (${currentBuild.cooler.tdp}W) 低于 CPU TDP (${currentBuild.cpu.tdp}W)，高负载可能过热！`);
        }
    }

    // 4. 接口匹配提醒
    if (currentBuild.motherboard && currentBuild.case) {
        // 前置 Type-C 检测（基于名称关键词）
        const hasMotherboardTypeC = currentBuild.motherboard.name.toLowerCase().includes('type-c') || 
                                     currentBuild.motherboard.name.toLowerCase().includes('usb-c');
        const hasCaseTypeC = currentBuild.case.name.toLowerCase().includes('type-c') || 
                             currentBuild.case.name.toLowerCase().includes('usb-c');
        if (hasMotherboardTypeC && !hasCaseTypeC) {
            tips.push(`🔌 主板支持前置Type-C，但机箱未提供，可能无法使用前置C口。`);
        } else if (!hasMotherboardTypeC && hasCaseTypeC) {
            tips.push(`🔌 机箱有前置Type-C，但主板无对应插针，接口无法使用。`);
        } else if (hasMotherboardTypeC && hasCaseTypeC) {
            tips.push(`✅ 主板与机箱均支持前置Type-C，可享受高速传输。`);
        }
    }

    // 5. 内存与大型风冷干涉提醒
    if (currentBuild.cooler && currentBuild.cooler.type === 'air' && currentBuild.memory) {
        if (currentBuild.cooler.spec && currentBuild.cooler.spec.includes('双塔')) {
            tips.push(`⚠️ 双塔风冷散热器可能遮挡第一条内存插槽，建议使用矮条内存或调整安装顺序。`);
        }
    }

    // 6. PCIe 版本匹配提醒
    if (currentBuild.motherboard && currentBuild.gpu) {
        const isPcie5Gpu = currentBuild.gpu.name.toLowerCase().includes('pcie 5.0') || 
                            currentBuild.gpu.name.toLowerCase().includes('gen5');
        const isPcie4Gpu = currentBuild.gpu.name.toLowerCase().includes('pcie 4.0') || 
                            currentBuild.gpu.name.toLowerCase().includes('gen4');
        const isPcie5Mb = currentBuild.motherboard.name.toLowerCase().includes('pcie 5.0') ||
                           currentBuild.motherboard.name.toLowerCase().includes('gen5');
        const isPcie4Mb = currentBuild.motherboard.name.toLowerCase().includes('pcie 4.0') ||
                           currentBuild.motherboard.name.toLowerCase().includes('gen4');
        if (isPcie5Gpu && !isPcie5Mb && isPcie4Mb) {
            tips.push(`⚡ 显卡支持PCIe 5.0，但主板仅支持PCIe 4.0，性能无显著影响，可正常使用。`);
        } else if (isPcie4Gpu && !isPcie4Mb && !isPcie5Mb) {
            tips.push(`⚡ 主板仅支持PCIe 3.0，显卡为PCIe 4.0，性能约损失 3-5%，可接受。`);
        }
    }

    // 7. 电源接口与显卡供电提醒
    if (currentBuild.psu && currentBuild.gpu) {
        const gpuPower = currentBuild.gpu.power || 550;
        if (currentBuild.psu.wattage < gpuPower) {
            tips.push(`⚠️ 电源功率 (${currentBuild.psu.wattage}W) 低于显卡建议功率 (${gpuPower}W)，可能无法稳定运行！`);
        }
        // 高端显卡需要 12VHPWR 接口提醒（关键词）
        if (currentBuild.gpu.name.toLowerCase().includes('4090') || 
            currentBuild.gpu.name.toLowerCase().includes('4080') ||
            currentBuild.gpu.name.toLowerCase().includes('5090')) {
            if (!currentBuild.psu.name.toLowerCase().includes('12vhpwr') && 
                !currentBuild.psu.name.toLowerCase().includes('pcie 5.0')) {
                tips.push(`🔌 显卡为高端型号，建议使用原生12VHPWR接口电源，避免转接线风险。`);
            }
        }
    }

    // 8. 总价与预算提醒（可选）
    const total = Object.values(currentBuild).reduce((s, i) => s + (i?.price || 0), 0);
    const budgetSlider = document.getElementById('budget-slider');
    if (budgetSlider) {
        const budget = parseInt(budgetSlider.value);
        if (total > budget * 1.05) {
            tips.push(`💰 当前总价超出预算 ${Math.round((total - budget)/budget*100)}%，建议调整配件。`);
        } else if (total < budget * 0.7) {
            tips.push(`💰 预算充足，可考虑升级显卡、内存或散热器获得更好性能。`);
        }
    }

    // 显示提示，最多8条
    if (tips.length === 0) {
        tipsDiv.innerHTML = '<div class="text-gray-400 text-center">✨ 暂无特别注意事项，配置看起来不错！</div>';
    } else {
        tipsDiv.innerHTML = tips.map(t => `<div class="flex items-start gap-2"><span class="text-blue-400">•</span><span>${t}</span></div>`).join('');
    }
}
    </script>
</body>
</html>
